<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>503 - Service Unavailable</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #F7F8FD;
      color: #3A4374;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      max-width: 400px;
      text-align: center;
    }

    .error-code {
      font-size: 6rem;
      font-weight: bold;
      color: #4661E6;
      line-height: 1;
      margin-bottom: 1rem;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #3A4374;
      margin-bottom: 0.75rem;
    }

    .error-message {
      color: #647196;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 2rem;
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    .icon .gear {
      fill: #AD1FEA;
    }

    .icon .wrench {
      fill: #4661E6;
    }

    .retry-button {
      background-color: #4661E6;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 0.75rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background-color 0.2s ease;
    }

    .retry-button:hover {
      background-color: #3741A6;
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #647196;
      font-size: 0.875rem;
      margin-top: 2rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background-color: #F49F85;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    @media (max-width: 480px) {
      .error-code {
        font-size: 4rem;
      }

      .error-title {
        font-size: 1.25rem;
      }

      .icon {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path class="gear" d="M12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9C10.3431 9 9 10.3431 9 12C9 13.6569 10.3431 15 12 15Z"/>
        <path class="gear" d="M19.43 12.98C19.47 12.66 19.5 12.34 19.5 12C19.5 11.66 19.47 11.34 19.43 11.02L21.54 9.37C21.73 9.22 21.78 8.95 21.66 8.73L19.66 5.27C19.54 5.05 19.27 4.96 19.05 5.05L16.56 6.05C16.04 5.65 15.48 5.32 14.87 5.07L14.49 2.42C14.46 2.18 14.25 2 14 2H10C9.75 2 9.54 2.18 9.51 2.42L9.13 5.07C8.52 5.32 7.96 5.66 7.44 6.05L4.95 5.05C4.73 4.96 4.46 5.05 4.34 5.27L2.34 8.73C2.21 8.95 2.27 9.22 2.46 9.37L4.57 11.02C4.53 11.34 4.5 11.67 4.5 12C4.5 12.33 4.53 12.66 4.57 12.98L2.46 14.63C2.27 14.78 2.21 15.05 2.34 15.27L4.34 18.73C4.46 18.95 4.73 19.03 4.95 18.95L7.44 17.94C7.96 18.34 8.52 18.68 9.13 18.93L9.51 21.58C9.54 21.82 9.75 22 10 22H14C14.25 22 14.46 21.82 14.49 21.58L14.87 18.93C15.48 18.68 16.04 18.34 16.56 17.95L19.05 18.95C19.27 19.04 19.54 18.95 19.66 18.73L21.66 15.27C21.78 15.05 21.73 14.78 21.54 14.63L19.43 12.98Z"/>
        <path class="wrench" d="M14.7 6.3C14.3 5.9 13.7 5.9 13.3 6.3L10.6 9L11.3 9.7L14 7C14.4 6.6 15 6.6 15.4 7L18.4 10L16.7 11.7C16.3 12.1 16.3 12.7 16.7 13.1C17.1 13.5 17.7 13.5 18.1 13.1L21.1 10.1C21.5 9.7 21.5 9.1 21.1 8.7L14.7 6.3Z"/>
        <path class="wrench" d="M5.3 17.7L7 16L4 13C3.6 12.6 3.6 12 4 11.6L7 8.6C7.4 8.2 8 8.2 8.4 8.6C8.8 9 8.8 9.6 8.4 10L6.7 11.7L9.7 14.7L11.4 13C11.8 12.6 12.4 12.6 12.8 13C13.2 13.4 13.2 14 12.8 14.4L9.8 17.4C9.4 17.8 8.8 17.8 8.4 17.4L5.3 17.7Z"/>
      </svg>
    </div>

    <div class="error-code">503</div>
    <h1 class="error-title">Service Unavailable</h1>
    <p class="error-message">
      We're currently performing maintenance on our servers. Please check back soon, or try refreshing the page.
    </p>

    <a href="/" class="retry-button">Try Again</a>

    <div class="status-indicator">
      <span class="status-dot"></span>
      <span>Maintenance in progress</span>
    </div>
  </div>
</body>
</html>
